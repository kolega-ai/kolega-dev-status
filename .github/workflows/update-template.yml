name: Update Template CI
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  update-template:
    runs-on: ubuntu-latest
    steps:
      - name: Run update template
        uses: upptime/uptime-monitor@master
        with:
          command: update-template
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
