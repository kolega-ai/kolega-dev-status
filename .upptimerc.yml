owner: kolega-ai
repo: kolega-dev-status

sites:
  - name: Website
    url: https://kolega.dev

  - name: App
    url: https://app.kolega.dev

  - name: API Health
    url: https://api.kolega.dev/health

status-website:
  cname: status.kolega.dev
  logoUrl: https://kolega.dev/logos/kolega.svg
  favicon: https://kolega.dev/favicon.svg
  name: Kolega.dev Status
  introTitle: "This is the uptime monitor and status page for [Kolega.dev](https://kolega.dev)."
  navbar:
    - title: Status
      href: /
    - title: Kolega.dev
      href: https://kolega.dev
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  css: |
    :root {
      --body-background-color: #0A0A0A;
      --body-text-color: #e2e8f0;
      --card-background-color: #1A1A1A;
      --card-border-color: #2A2A2A;
      --nav-background-color: #0A0A0A;
      --nav-border-bottom-color: #2A2A2A;
      --nav-current-border-bottom-color: #ADDD30;
      --up-border-left-color: #ADDD30;
      --down-border-left-color: #eb3b5a;
      --down-background-color: #3b1020;
      --degraded-border-left-color: #f7b731;
      --tag-color: #0A0A0A;
      --tag-up-background-color: #ADDD30;
      --tag-down-background-color: #eb3b5a;
      --tag-degraded-background-color: #f7b731;
      --change-background-color: #f7b731;
      --error-button-border-color: #1a46ad;
      --error-button-background-color: #3867d6;
      --error-button-color: #ffffff;
      --submit-button-border-color: #1a46ad;
      --submit-button-background-color: #3867d6;
      --submit-button-color: #ffffff;
      --graph-opacity: 1;
      --graph-filter: grayscale(100%) brightness(0.8);
    }
    a { color: #ADDD30; }
    a:hover { color: #C4F03E; }
    h1, h2, h3 { color: #ffffff; }
    .logo div { color: #ffffff; }
    nav a { color: #e2e8f0; }
    nav a:hover { color: #ADDD30; }
    article.link a { color: #ffffff; }
    article.link .data { color: #e2e8f0; }
    article.graph { filter: grayscale(100%) brightness(0.8); }
    article .graph { filter: grayscale(100%) brightness(0.8); }
    .live-status article { filter: grayscale(100%) brightness(0.8); }
    footer { opacity: 0; }
  graphBackgroundColor: "#ADDD3040"
  graphBorderColor: "#ADDD30"
